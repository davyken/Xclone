name: Daily Fun Fact

on:
  schedule:
    - cron: "0 0 * * *"  # Starts at midnight UTC, then random sleep
  workflow_dispatch:      # Manual trigger - no sleep

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fun-fact:
    runs-on: ubuntu-latest

    steps:
      - name: Wait a random amount of time (only on scheduled runs)
        if: github.event_name == 'schedule'
        run: |
          SLEEP_TIME=$(( RANDOM % 82800 ))
          echo "⏳ Waiting $SLEEP_TIME seconds before committing..."
          sleep $SLEEP_TIME

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch a random fun fact
        id: fact
        run: |
          FACT=$(curl -s "https://uselessfacts.jsph.pl/random.json?language=en" | python3 -c "import sys,json; print(json.load(sys.stdin)['text'])")
          if [ -z "$FACT" ]; then
            FACT="The longest place name in the world is in New Zealand and has 85 characters."
          fi
          echo "fact=$FACT" >> $GITHUB_OUTPUT

      - name: Update FACTS.md
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M")
          FACT="${{ steps.fact.outputs.fact }}"

          if [ ! -f FACTS.md ]; then
            echo "# 🧠 Daily Fun Facts" > FACTS.md
            echo "" >> FACTS.md
            echo "A random fact added every day automatically." >> FACTS.md
            echo "" >> FACTS.md
            echo "---" >> FACTS.md
            echo "" >> FACTS.md
          fi

          TEMP=$(mktemp)
          head -6 FACTS.md > "$TEMP"
          echo "### 📅 $DATE at $TIME UTC" >> "$TEMP"
          echo "" >> "$TEMP"
          echo "> $FACT" >> "$TEMP"
          echo "" >> "$TEMP"
          tail -n +7 FACTS.md >> "$TEMP"
          mv "$TEMP" FACTS.md

      - name: Commit and push
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M")
          git add FACTS.md
          git commit -m "feat: fun fact $DATE at $TIME" || echo "Nothing to commit"
          git push