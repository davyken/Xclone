name: Daily Fun Fact

on:
  schedule:
    - cron: "0 0 * * *"  # Démarre à minuit UTC, puis sleep aléatoire
  workflow_dispatch:

jobs:
  fun-fact:
    runs-on: ubuntu-latest

    steps:
      - name: Wait a random amount of time (simulate random hour)
        run: |
          # Génère un délai aléatoire entre 0 et 23h (en secondes)
          SLEEP_TIME=$(( RANDOM % 82800 ))
          echo "⏳ Attente de $SLEEP_TIME secondes avant le commit..."
          sleep $SLEEP_TIME

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch a random fun fact
        id: fact
        run: |
          FACT=$(curl -s "https://uselessfacts.jsph.pl/random.json?language=en" | python3 -c "import sys,json; print(json.load(sys.stdin)['text'])")
          echo "fact=$FACT" >> $GITHUB_OUTPUT

      - name: Update FACTS.md
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M")
          FACT="${{ steps.fact.outputs.fact }}"

          if [ ! -f FACTS.md ]; then
            echo "# 🧠 Daily Fun Facts" > FACTS.md
            echo "" >> FACTS.md
            echo "Un fait aléatoire ajouté chaque jour automatiquement." >> FACTS.md
            echo "" >> FACTS.md
            echo "---" >> FACTS.md
            echo "" >> FACTS.md
          fi

          TEMP=$(mktemp)
          head -6 FACTS.md > "$TEMP"
          echo "### 📅 $DATE à $TIME UTC" >> "$TEMP"
          echo "" >> "$TEMP"
          echo "> $FACT" >> "$TEMP"
          echo "" >> "$TEMP"
          tail -n +7 FACTS.md >> "$TEMP"
          mv "$TEMP" FACTS.md

      - name: Commit and push
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M")
          git add FACTS.md
          git commit -m "feat: fun fact du $DATE à $TIME"
          git push