name: Daily Fun Fact

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  fun-fact:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Wait random time (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          SLEEP_TIME=$(( RANDOM % 82800 ))
          echo "Waiting $SLEEP_TIME seconds..."
          sleep $SLEEP_TIME

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pick a random fun fact
        id: fact
        run: |
          FACTS=(
            "Honey never spoils. Archaeologists found 3000-year-old honey in Egyptian tombs still perfectly edible."
            "A group of flamingos is called a flamboyance."
            "Octopuses have three hearts and blue blood."
            "Bananas are berries, but strawberries are not."
            "The shortest war in history lasted only 38 minutes between Britain and Zanzibar in 1896."
            "A day on Venus is longer than a year on Venus."
            "The human nose can detect over 1 trillion different scents."
            "Cleopatra lived closer in time to the Moon landing than to the construction of the Great Pyramid."
            "There are more possible iterations of a game of chess than atoms in the observable universe."
            "The Eiffel Tower can be 15cm taller during summer due to thermal expansion."
            "A bolt of lightning is 5 times hotter than the surface of the sun."
            "Crows can recognize and remember human faces."
            "Sharks are older than trees. They have existed for over 400 million years."
            "The average person walks the equivalent of 3 times around the Earth in their lifetime."
            "Wombat poop is cube-shaped — the only animal known to produce cube-shaped droppings."
            "A snail can sleep for 3 years at a time."
            "The inventor of the frisbee was turned into a frisbee after he died."
            "Elephants are the only animals that cannot jump."
            "It rains diamonds on Neptune and Uranus."
            "A group of owls is called a parliament."
            "The fingerprints of a koala are so similar to humans that they have confused crime scene investigators."
            "Almonds are a member of the peach family."
            "The dot over the letter i is called a tittle."
            "Tigers have striped skin, not just striped fur."
            "The average cloud weighs around 1.1 million pounds."
            "Sloths can hold their breath longer than dolphins can."
            "Turtles can breathe through their butts."
            "Scotland's national animal is the unicorn."
            "The longest hiccuping spree lasted 68 years."
            "A group of cats is called a clowder."
          )
          FACT=${FACTS[$RANDOM % ${#FACTS[@]}]}
          echo "fact=$FACT" >> $GITHUB_OUTPUT
          echo "Selected: $FACT"

      - name: Update FACTS.md on dev
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M")
          FACT="${{ steps.fact.outputs.fact }}"

          if [ ! -f FACTS.md ]; then
            echo "# 🧠 Daily Fun Facts" > FACTS.md
            echo "" >> FACTS.md
            echo "A random fact added every day automatically." >> FACTS.md
            echo "" >> FACTS.md
            echo "---" >> FACTS.md
            echo "" >> FACTS.md
          fi

          TEMP=$(mktemp)
          head -6 FACTS.md > "$TEMP"
          echo "### 📅 $DATE at $TIME UTC" >> "$TEMP"
          echo "" >> "$TEMP"
          echo "> $FACT" >> "$TEMP"
          echo "" >> "$TEMP"
          tail -n +7 FACTS.md >> "$TEMP"
          mv "$TEMP" FACTS.md

          echo "FACTS.md updated!"

      - name: Commit and push to dev
        run: |
          DATE=$(date +"%Y-%m-%d")
          TIME=$(date +"%H:%M")
          git add FACTS.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "feat: fun fact $DATE at $TIME"
            git push origin dev
            echo "Pushed to dev!"
          fi

      - name: Create PR from dev to main
        id: pr
        run: |
          DATE=$(date +"%Y-%m-%d")
          FACT="${{ steps.fact.outputs.fact }}"

          # Check if a PR from dev to main already exists
          EXISTING_PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, merging it..."
            gh pr merge "$EXISTING_PR" --squash --delete-branch=false
          else
            echo "Creating new PR..."
            PR_URL=$(gh pr create \
              --title "🧠 Daily Fun Fact - $DATE" \
              --body "## Fun Fact of the Day 🎉

> $FACT

---
*This PR was created automatically by the Daily Fun Fact workflow.*" \
              --base main \
              --head dev)

            echo "PR created: $PR_URL"
            gh pr merge "$PR_URL" --squash --auto --delete-branch=false
            echo "PR set to auto merge!"
          fi